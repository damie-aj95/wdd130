<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="White water rafting adventures and outdoor experiences.">
    <meta name="author" content="Damilare Samuel Ajayi">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <div class="contact-details">
                <div class="map-container">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d82883.5324135854!2d-113.04286300987253!3d37.310734871795!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80caead08844f8d9%3A0x7c2e3a15aa3656f5!2sZion%20National%20Park!5e0!3m2!1sen!2sng!4v1781189161245!5m2!1sen!2sng"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade"
                      title="White Water Rafting Company Location"></iframe>
                </div>
                <div class="company-address">
                    <p>Utah, United States</p>
                    <p>7XXF+7F Springdale, Utah, USA</p>
                    <p>+14357723256</p>
                    <p>info@whitewater.com</p>
                </div>

            </div>
        </section>
        <section class="contact-form-section">
            <h2>Get In Touch</h2>
            <div class="form-container">
                <form action="#" method="get">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your full name"
                          required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com"
                          required>
                    </div>

                    <div class="form-group">
                        <label>Message Purpose</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" id="general" name="purpose" value="general"
                                  checked>
                                General Inquiry
                            </label>
                            <label class="radio-label">
                                <input type="radio" id="reservation" name="purpose"
                                  value="reservation">
                                Reservation Question
                            </label>
                            <label class="radio-label">
                                <input type="radio" id="website" name="purpose" value="website">
                                Website Suggestion
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" rows="5"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                            Please subscribe me to the monthly newsletter
                        </label>
                    </div>
                    <button type="submit" class="submit-btn">Get In Touch</button>
                </form>
            </div>
        </section>

        <section class="team-section">
            <h2>We Are Here To Serve You</h2>
            <div class="team-gallery">
                <figure>
                    <img src="images/employee1.jpg" alt="Marcus Rivera - Head River Guard">
                    <figcaption>Marcus Rivera<br>Head River Guard</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Andrew Gap - Safety Officer">
                    <figcaption>Andrew Gap<br>Safety Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Sarah Johnson - Trip Coordinator">
                    <figcaption>Sarah Johnson<br>Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 🚣‍♂️2026 White Water Rafting | Damilare Samuel Ajayi</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Visit our Facebook page">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Visit our Instagram page">
            </a>
            <a href="https://x.com">
                <img src="images/x-icon.png" alt="Visit our X (Twitter) page">
            </a>
        </nav>
    </footer>
</body>

</html>
